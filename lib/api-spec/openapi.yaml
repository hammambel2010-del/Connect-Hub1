openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Social Connect API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: messages
    description: Direct and group messaging
  - name: groups
    description: Group management
  - name: friends
    description: Friend requests and connections
  - name: storage
    description: Object storage upload and serving endpoints
  - name: admin
    description: Admin management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users / Profile ──────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search for users by name or username
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get a user's public profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found

  # ── Friends ───────────────────────────────────────────────────────────────────
  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get current user's friend list
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSummary"

  /friends/requests:
    get:
      operationId: getFriendRequests
      tags: [friends]
      summary: Get pending friend requests (incoming)
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

  /friends/requests/{userId}:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
    delete:
      operationId: cancelFriendRequest
      tags: [friends]
      summary: Cancel or unfriend
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /friends/requests/{requestId}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  /friends/requests/{requestId}/reject:
    post:
      operationId: rejectFriendRequest
      tags: [friends]
      summary: Reject a friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"

  # ── Direct Messages ───────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: List all direct message conversations
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"

  /conversations/{userId}:
    get:
      operationId: getDirectMessages
      tags: [messages]
      summary: Get messages in a direct conversation
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: before
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendDirectMessage
      tags: [messages]
      summary: Send a direct message
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ── Groups ────────────────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: getMyGroups
      tags: [groups]
      summary: Get groups the current user belongs to
      responses:
        "200":
          description: Groups list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/search:
    get:
      operationId: searchGroups
      tags: [groups]
      summary: Search for public groups
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Matching groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "404":
          description: Not found
    patch:
      operationId: updateGroup
      tags: [groups]
      summary: Update group info (admin only)
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group (admin only)
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /groups/{groupId}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      summary: Join a public group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}/leave:
    post:
      operationId: leaveGroup
      tags: [groups]
      summary: Leave a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Left

  /groups/{groupId}/members:
    get:
      operationId: getGroupMembers
      tags: [groups]
      summary: Get members of a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupMember"

  /groups/{groupId}/messages:
    get:
      operationId: getGroupMessages
      tags: [messages]
      summary: Get messages in a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendGroupMessage
      tags: [messages]
      summary: Send a message to a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ── Storage ───────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Admin ────────────────────────────────────────────────────────────────────
  /admin/verify:
    post:
      operationId: verifyAdmin
      tags: [admin]
      summary: Verify admin password and gain admin rank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVerifyInput"
      responses:
        "200":
          description: Admin rank granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Wrong password

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users with admin info (admin/co-admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden

  /admin/users/{userId}/rank:
    put:
      operationId: setUserRank
      tags: [admin]
      summary: Set a user rank (admin/co-admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankInput"
      responses:
        "200":
          description: Rank updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden

  /admin/users/{userId}/ban:
    post:
      operationId: banUser
      tags: [admin]
      summary: Ban a user (admin/co-admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden
    delete:
      operationId: unbanUser
      tags: [admin]
      summary: Unban a user (admin/co-admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    UserProfile:
      type: object
      required: [id, clerkId, username, displayName, createdAt, rank]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        age:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        rank:
          type: string
          enum: [user, content_creator, hollywood, important, well_connected, advisor, co_admin, admin]
        friendCount:
          type: integer
        groupCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    UserProfileUpdate:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        displayName:
          type: string
          minLength: 1
        bio:
          type: string
        age:
          type: integer
          minimum: 13
          maximum: 120
        avatarUrl:
          type: string
        coverUrl:
          type: string

    UserSummary:
      type: object
      required: [id, clerkId, username, displayName, rank]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        rank:
          type: string
          enum: [user, content_creator, hollywood, important, well_connected, advisor, co_admin, admin]
        friendStatus:
          type: ["string", "null"]
          enum: ["friends", "pending_sent", "pending_received", null]

    FriendRequest:
      type: object
      required: [id, fromUserId, toUserId, status, createdAt]
      properties:
        id:
          type: integer
        fromUserId:
          type: integer
        toUserId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected]
        fromUser:
          $ref: "#/components/schemas/UserSummary"
        toUser:
          $ref: "#/components/schemas/UserSummary"
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      required: [id, senderId, content, createdAt]
      properties:
        id:
          type: integer
        senderId:
          type: integer
        recipientId:
          type: ["integer", "null"]
        groupId:
          type: ["integer", "null"]
        content:
          type: string
        mediaUrl:
          type: ["string", "null"]
        mediaType:
          type: ["string", "null"]
          enum: ["image", "video", null]
        sender:
          $ref: "#/components/schemas/UserSummary"
        createdAt:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        mediaUrl:
          type: string
        mediaType:
          type: string
          enum: [image, video]

    ConversationSummary:
      type: object
      required: [user, lastMessage, unreadCount]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer

    Group:
      type: object
      required: [id, name, isPublic, memberCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isPublic:
          type: boolean
        memberCount:
          type: integer
        myRole:
          type: ["string", "null"]
          enum: ["admin", "member", null]
        createdAt:
          type: string
          format: date-time

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        avatarUrl:
          type: string
        isPublic:
          type: boolean
          default: true

    GroupUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        avatarUrl:
          type: string
        isPublic:
          type: boolean

    GroupMember:
      type: object
      required: [user, role, joinedAt]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AdminVerifyInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    RankInput:
      type: object
      required: [rank]
      properties:
        rank:
          type: string
          enum: [user, content_creator, hollywood, important, well_connected, advisor, co_admin, admin]

    BanInput:
      type: object
      properties:
        reason:
          type: string
        durationHours:
          type: ["integer", "null"]
          description: Ban duration in hours. null means permanent.

    AdminUser:
      type: object
      required: [id, clerkId, username, displayName, rank, isBanned]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        rank:
          type: string
          enum: [user, content_creator, hollywood, important, well_connected, advisor, co_admin, admin]
        isBanned:
          type: boolean
        banExpiresAt:
          type: ["string", "null"]
          format: date-time
        banReason:
          type: ["string", "null"]
