worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths writable by non-root
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Allow large media uploads (matches storage route)
    client_max_body_size 100M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 7860;
        server_name _;

        # ── Clerk proxy ────────────────────────────────────────────
        # The Express middleware is mounted at /api/__clerk
        # Pass the full path so Express can match it correctly
        location /api/__clerk/ {
            proxy_pass         http://127.0.0.1:8080/api/__clerk/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── REST API ───────────────────────────────────────────────
        # Strip the /api prefix before forwarding to Express.
        # Express routes are mounted at / (e.g. /healthz, /users/me)
        location /api/ {
            proxy_pass         http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Static frontend (SPA) ──────────────────────────────────
        location / {
            root  /var/www/html;
            index index.html;
            # SPA fallback: unknown paths → index.html (React Router handles it)
            try_files $uri $uri/ /index.html;

            # Cache immutable hashed assets aggressively
            location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
        }
    }
}
